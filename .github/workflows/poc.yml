name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      user-id:
        description: User ID (leave blank to use current user)
        required: false
        
permissions:
  contents: read
  id-token: write
  checks: write
env:
# 2. Handle User ID (Safely extract only if client_payload exists)
  env:
  # Checks workflow_dispatch input, then client_payload, and defaults to github.actor
  USER_ID: "${{ github.event.inputs.user-id || github.actor }}"
  
jobs:
  # ──────────────────────────────────────────────
  # Shared Build, Test & Publish
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        
      - name: Print user
        run: |
          echo "USER_ID=$USER_ID"
          
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: ./test-results/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Publish
        run: dotnet publish --configuration Release --no-build --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: ./publish
          retention-days: 5

  # ──────────────────────────────────────────────
  # Product A Release Chain
  # ──────────────────────────────────────────────
  product-a-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: product-a-dev
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-package
          path: ./publish
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/webapps-deploy@v3
        with:
          app-name: app-product-a-dev
          resource-group: rg-product-a-dev
          package: ./publish
      - run: az logout

  product-a-qa:
    needs: product-a-dev
    runs-on: ubuntu-latest
    environment: product-a-qa
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-package
          path: ./publish
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/webapps-deploy@v3
        with:
          app-name: app-product-a-qa
          resource-group: rg-product-a-qa
          package: ./publish
      - run: az logout

  product-a-uat:
    needs: product-a-qa
    runs-on: ubuntu-latest
